    <line x1="6" y1="37" x2="24" y2="37" stroke="#D4AC0D" stroke-width="1.2" opacity="0.5"/>
    <line x1="6" y1="44" x2="24" y2="44" stroke="#D4AC0D" stroke-width="1.2" opacity="0.5"/>
    <line x1="6" y1="51" x2="24" y2="51" stroke="#D4AC0D" stroke-width="1.2" opacity="0.5"/>
    <!-- Page lines right -->
